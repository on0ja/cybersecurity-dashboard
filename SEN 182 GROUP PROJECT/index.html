<!DOCTYPE html>
<html lang="en">

<body>

<div class="container">

  <aside class="sidebar">
    <h2>CyberSecure</h2>

      <li><a href="threats.html">Threats</a></li>
      <li><a href="reports.html">Reports</a></li>
    </ul>

  <main class="content">

      <div class="card">Resolved: 104</div>

      <p>Severity: High</p>

  <div class="modal-content">
    <span onclick="closeModal()">&times;</span>

  </div>
